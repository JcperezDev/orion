name: Release

# Builds the CLI binaries on a self-hosted runner (free; works despite the
# GitHub-hosted Actions billing lock) and attaches them to the GitHub Release
# for the pushed tag:
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Builds Linux natively and Windows via `cross` (Docker). macOS needs a
# GitHub-hosted macOS runner (re-enable a hosted matrix once Actions billing
# is restored) or a self-hosted Mac.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: PATH
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build Linux (x86_64)
        run: cargo build --release --locked -p orion -p orion-server

      - name: Build Windows (x86_64, via cross)
        run: |
          rustup target add x86_64-pc-windows-gnu
          cross build --release --locked --target x86_64-pc-windows-gnu -p orion -p orion-server

      - name: Package
        run: |
          set -e
          rm -rf dist && mkdir -p dist
          L="orion-x86_64-unknown-linux-gnu"
          mkdir -p "dist/$L"
          cp target/release/orion target/release/orion-server README.md LICENSE "dist/$L/"
          (cd dist && tar -czf "$L.tar.gz" "$L")
          W="orion-x86_64-pc-windows-gnu"
          mkdir -p "dist/$W"
          cp target/x86_64-pc-windows-gnu/release/orion.exe target/x86_64-pc-windows-gnu/release/orion-server.exe README.md LICENSE "dist/$W/"
          (cd dist && zip -qr "$W.zip" "$W")

      - name: Publish to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" --title "ORION $TAG" --generate-notes 2>/dev/null || true
          gh release upload "$TAG" dist/*.tar.gz dist/*.zip --clobber
