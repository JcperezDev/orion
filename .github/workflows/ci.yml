name: CI

# Runs on a self-hosted runner (free, and unaffected by the GitHub-hosted
# Actions billing lock). Triggered only on pushes to master and manual dispatch
# — NOT on pull_request — so untrusted fork code never runs on the self-hosted
# machine (important for a public repo).

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: PATH
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Frontend (typecheck + build)
        working-directory: apps/orion-desktop
        run: |
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Format check (advisory)
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Clippy (advisory)
        run: cargo clippy --workspace --all-targets
        continue-on-error: true
