name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (build, test, lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # System libraries required to build the Tauri desktop crate on Linux.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Hard gates: the workspace must build and tests must pass.
      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      # Advisory (non-blocking) for now — the codebase predates rustfmt/clippy.
      # Tighten to hard gates once the existing findings are cleared.
      - name: Format check (advisory)
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Clippy (advisory)
        run: cargo clippy --workspace --all-targets
        continue-on-error: true

  frontend:
    name: Desktop frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/orion-desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/orion-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
